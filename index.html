<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CodeReader Pro">
  <title>CodeReader Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/android-chrome-512x512.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header class="app-header">
      <button id="menuToggle" class="hamburger" aria-label="Toggle sidebar">☰</button>

      <!-- Logo -->
      <a href="#" class="app-logo" id="appLogo">
        <img src="icons/logo.png" alt="CodeReader" id="logoImg" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'">
        <span style="display:inline;">CodeReader</span>
        <span style="display:none;font-size:1.5rem;">📁</span>
      </a>

      <div style="flex:1;"></div>

      <div class="header-actions">
        <!-- PWA Install / Open in App button (single control, state-driven) -->
        <button id="pwaActionBtn" aria-label="Install app" style="display:none;background:transparent;border:none;color:var(--text-primary);font-size:20px;cursor:pointer;"></button>
        <button id="themeToggle" aria-label="Toggle theme">🌙</button>
        <button id="fullscreenToggle" aria-label="Fullscreen" style="background:transparent;border:none;color:var(--text-primary);font-size:20px;cursor:pointer;">⛶</button>
      </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-inner">
          <div class="search-box">
            <input type="text" id="fileSearch" placeholder="🔍 Search files...">
          </div>
          <div class="picker-group">
            <label for="folderPicker" class="picker-label">📁 Select Folder</label>
            <input type="file" id="folderPicker" webkitdirectory directory multiple>
          </div>
          <div class="picker-group">
            <label for="filePicker" class="picker-label">📄 Select File(s)</label>
            <input type="file" id="filePicker" multiple accept="*/*">
          </div>

          <div id="fileStats" style="font-size:0.75rem;color:var(--text-secondary);padding:4px 0;margin-bottom:8px;"></div>
          <div id="fileList" class="file-list">
            <p class="placeholder">No files loaded</p>
          </div>
        </div>
      </aside>

      <!-- Viewer -->
      <main class="viewer">
        <div class="viewer-header">
          <span id="fileName">No file selected</span>
          <span id="fileSize" class="file-meta"></span>
          <span id="fileTypeBadge" class="file-type-badge badge-other">Unknown</span>
        </div>
        <div id="codeContent" class="code-content">
          <div class="empty-state">📂 Select a file to preview</div>
        </div>
      </main>
    </div>
  </div>

  <!-- Offline-capable file renderers (cache these in service-worker.js for true offline support) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./service-worker.js")
          .then(() => console.log("Service Worker Registered"))
          .catch((error) => console.log("Service Worker Registration Failed:", error));
      });
    }
  </script>
</body>
</html>
